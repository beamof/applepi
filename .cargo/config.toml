# 项目级 cargo 配置。
#
# 当前唯一作用：给 Linux 链接器兜底加 -lstdc++，解决 ort（ONNX Runtime）静态库
# 链接时报 undefined reference to '__cxa_call_terminate' 等 C++ 符号缺失问题。
# 这比 build.rs 的 cargo:rustc-link-lib 更强力，因为它是直接在 linker 命令行
# 加 `-C link-arg`，不会被依赖的 build script 干扰或覆盖。

[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-lstdc++"]

[target.'cfg(all(target_os = "linux", target_env = "musl"))']
rustflags = ["-C", "link-arg=-static-libstdc++"]
