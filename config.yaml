# 人设（agent persona）改在项目根目录的 AGENTS.md 里维护，这里不再配置。

llm:
  # OpenAI 兼容接口。换厂商只需改这里：
  # DeepSeek: https://api.deepseek.com/v1        model: deepseek-chat
  # 智谱:     https://open.bigmodel.cn/api/paas/v4 model: glm-4-flash
  # 本地:     http://localhost:11434/v1           model: qwen2.5
  api_base: https://chat.openai.com/v1
  model: gemini-3-flash-agent
  # API Key：留空则回退到环境变量 OPENAI_API_KEY（或 API_KEY）
  api_key: ""

embeddings:
  # 本地 embedding 模型（基于 candle 纯 Rust 推理，离线、无需 API key）。
  # 可选：bge-small-zh-v1.5（默认，512 维，~100MB，中文优化）
  #       bge-large-zh-v1.5（1024 维，~1.2GB，质量更好）
  #       multilingual-e5-small / base / large（多语言均衡）
  #       bge-small-en-v1.5 / bge-base-en-v1.5（纯英文）
  # 首次启动会自动从 HuggingFace 下载权重（默认 ~/.cache/huggingface）。
  model: bge-small-zh-v1.5
  # cache_dir: ./model_cache  # 自定义模型缓存目录；留空用 HF_HOME 默认

memory:
  enabled: true
  db_path: data/applepi.db
  top_k: 3 # 每次对话注入的最多相关记忆数

telegram:
  # bot_token 留空则从环境变量 TELEGRAM_BOT_TOKEN 读取
  bot_token: ""

# MCP 服务器（Streamable HTTP 传输）。不接入时整段注释掉或留空。
# 示例：
#   - name: example
#     url: https://mcp.example.com/mcp
#     headers:           # 可选，额外请求头
#       Authorization: "Bearer xxx"
#     enabled: true      # 可选，默认 true
# mcp_servers: []

# Cron 定时任务（仅 bot 模式生效）。enabled: false 表示不启用。
# 启用时把 enabled 改为 true，可同时配置种子 job（首次启动写入 DB，之后由 /cron 命令管理）。
# cron:
#   enabled: true
#   db_path: data/cron.db
#   jobs:
#     - name: daily_summary
#       schedule: "0 9 * * *"      # 北京时间每天 9:00
#       prompt: "总结今天的待办"
#       chat_id: 123456789         # 推送目标 Telegram chat_id
#       enabled: true
cron:
  enabled: false

# Shell 工具：让 agent 执行 shell 命令（受白名单/黑名单约束）。
# ⚠️ 安全提醒：白名单/黑名单是字符串匹配，不是沙箱，无法防御利用 shell 特性构造的绕过。
#    仅在可信环境、可信输入下启用；生产/多用户场景请用容器隔离或保持 enabled: false。
# shell:
#   enabled: true
#   allow:                     # 命令前缀白名单，为空则不限制（仅靠黑名单）
#     - "ls"
#     - "cat "
#     - "git status"
#     - "pwd"
#   deny: []                   # 子串黑名单，为空则使用内置默认（rm -rf / sudo / mkfs 等危险词）
#   timeout: 30                # 执行超时（秒）
#   # workdir: /tmp            # 工作目录，留空 = 当前目录
shell:
  enabled: false
